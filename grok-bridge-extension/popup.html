<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #f8fafc; }
    .header p  { font-size: 11px; color: #64748b; margin-top: 2px; }
    .status-bar {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1e293b;
      background: #0d1117;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.yellow { background: #eab308; box-shadow: 0 0 6px #eab30888; }
    .dot.red    { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .status-label { font-size: 12px; color: #94a3b8; }
    .section { padding: 12px 16px; border-bottom: 1px solid #1e293b; }
    .section-title { font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .info-label { color: #64748b; font-size: 12px; }
    .info-value { color: #cbd5e1; font-size: 12px; font-weight: 500; }
    .badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px;
    }
    .badge.green  { background: #14532d; color: #4ade80; }
    .badge.yellow { background: #422006; color: #fbbf24; }
    .badge.gray   { background: #1e293b; color: #64748b; }
    .btn {
      width: 100%; padding: 9px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: all 0.15s;
    }
    .btn-primary   { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #1e293b; color: #94a3b8; margin-top: 6px; }
    .btn-secondary:hover { background: #273344; color: #e2e8f0; }
    .log-area {
      background: #070b10;
      border-radius: 6px;
      padding: 8px;
      max-height: 120px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 11px;
      color: #4ade80;
      line-height: 1.6;
    }
    .log-area .log-err  { color: #f87171; }
    .log-area .log-info { color: #38bdf8; }
    .log-area .log-warn { color: #fbbf24; }
    .footer { padding: 10px 16px; text-align: center; }
    .footer a { color: #4f46e5; text-decoration: none; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌉 Grok Bridge</h1>
    <p>YouTube 소재 발굴 도구 ↔ grok.com 연결</p>
  </div>

  <div class="status-bar">
    <div class="dot" id="connDot"></div>
    <span class="status-label" id="connLabel">상태 확인 중...</span>
  </div>

  <div class="section">
    <div class="section-title">연결 정보</div>
    <div class="info-row">
      <span class="info-label">웹앱 탭</span>
      <span class="badge" id="appBadge">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">grok.com 탭</span>
      <span class="badge" id="grokBadge">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">대기 중인 작업</span>
      <span class="info-value" id="pendingCount">0</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">제어</div>
    <button class="btn btn-primary" id="openGrokBtn">🔗 grok.com 열기</button>
    <button class="btn btn-secondary" id="openAppBtn">🖥 웹앱 열기 (localhost:8765)</button>
    <button class="btn btn-secondary" id="refreshBtn">🔄 상태 새로고침</button>
  </div>

  <div class="section">
    <div class="section-title">로그</div>
    <div class="log-area" id="logArea"><span class="log-info">초기화 중...</span></div>
  </div>

  <div class="footer">
    <a href="#" id="inspectLink">DOM 셀렉터 검사 모드</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
